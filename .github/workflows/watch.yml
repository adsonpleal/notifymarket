name: price-watch

on:
  workflow_dispatch: {}
  repository_dispatch:
    types: [price-check]

concurrency:
  group: price-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Restore dedupe state
        uses: actions/cache@v4
        with:
          path: state.json
          key: price-watch-state-${{ github.run_id }}
          restore-keys: price-watch-state-

      - run: pip install -r requirements.txt

      - run: python watch.py
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
